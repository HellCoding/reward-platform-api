spring:
  profiles:
    active: local

  application:
    name: reward-platform-api

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      connect-timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 10000ms

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=3600s

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation}
  access-token-expiration: 3600000    # 1 hour
  refresh-token-expiration: 1209600000 # 14 days

# Scheduler Configuration
scheduler:
  enabled: ${ENABLE_SCHEDULERS:true}

# Distributed Lock Configuration
distributed-lock:
  enabled: ${ENABLE_DISTRIBUTED_LOCK:true}
  key-prefix: "reward:lock:"
  timeout-ms: 60000
  expire-ms: 600000

# Point Policy
point:
  default-expiration-days: 365
  inactivity-threshold-days: 90

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: reward-platform-api

# Logging
logging:
  level:
    com.rewardplatform: DEBUG
    org.hibernate.SQL: DEBUG
